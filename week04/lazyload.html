<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Practice Lazyloading</title>
</head>
<body>
    <main>
        <h1>Lazily Loaded Images</h1>
        <img loading="lazy" src="images/alexas_fotos-elephant-7036431_1920.webp" alt="baby elephant with mother" width="400" height="600">
        <img loading="lazy" src="images/juergen57bs-goose-9548203_1920.webp" alt="gosling" width="400" height="600">
        <img loading="lazy" src="images/memorycatcher-penguins-429134_1920.webp" alt="baby peguin with parent" width="400" height="600">
        <img loading="lazy" src="images/monicamaxwest-huddle-of-walrus-8065100_1920.webp" alt="walrus with mother" width="400" height="600">
        <img loading="lazy" src="images/pavan_gude-monkey-7394077_1920.webp" alt="monkey with mother" width="400" height="600">
        <img loading="lazy" src="images/pezibear-foal-5238587_1920.webp" alt="foal with mother" width="400" height="600">
    </main>
    <footer>
        <p>©<span id="currentyear"></span> Mary Smith, California, USA</p>
        <p id="lastModified">last modified</p>
    </footer>
</body>
</html>
