<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/table.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Practice Table</title>
</head>
<body>
    <table>
        <caption>Table 1: Account Feature Comparison</caption>
        <thead>
            <tr>
                <th colspan="4" scope="colgroup">ACME Wildwest Services</th>
            </tr>
            <tr>
                <th scope="col"></th>
                <th scope="col" class="heading">Basic</th>
                <th scope="col" class="heading">Premium</th>
                <th scope="col" class="heading">Deluxe</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Feature 1</td>
                <td class="navy">✓</td>
                <td class="navy">✓</td>
                <td class="navy">✓</td>
            </tr>
            <tr>
                <td>Feature 2</td>
                <td class="red">❌</td>
                <td class="navy">✓</td>
                <td class="navy">✓</td>
            </tr>
            <tr>
                <td>Feature 3</td>
                <td class="red">❌</td>
                <td class="red">❌</td>
                <td class="navy">✓</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
